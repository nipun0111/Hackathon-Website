<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contact Us - Hackathon 2024</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Hackathon 2024</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.htm">Home</a></li>
                <li><a href="about.htm">About</a></li>
                <li><a href="schedule.htm">Schedule</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact hero-text">
        <h2>Contact Us</h2>
        <p1>If you have any questions or need further information, feel free to reach out to us using the contact form below:</p1>
        <form id="halwa">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
        <p id="successMessage" style="display:none; color: rgb(219, 170, 249);">Thank you for your Feedback!!!</p>
    </section>
    <script>
        document.getElementById('halwa').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
    
            if (name && email && message ) {
                document.getElementById('successMessage').style.display = 'block';
                alert('Message Sent Successfully');
    
                document.getElementById('halwa').reset();
    
            } else {
                alert('Please fill in all fields correctly.');
            }
        });
    </script>

    <footer>
        <p>&copy; 2024 Hackathon Event</p>
    </footer>
</body>
</html>
